<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PONG</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="wrapper" style="padding:6.2%">
        <h1 id="title">PONG</h1>
        <canvas id="canvas"></canvas>
        <div id="buttons">
            <button id="playBtn">Play music</button>
            <button id="stopBtn">Stop music</button>
            <button id="redColor">Red</button>
            <button id="greenColor">Green</button>
            <button id="yellowColor">Yellow</button>
            <button id="pinkColor">Pink</button>
            <button id="restartButton">Restart game</button>
        </div>
        <div class="speed-container">
            <input type="range" id="speedSlider" min="1" max="20" value="5">
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
